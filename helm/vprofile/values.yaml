app:
  image: vprocontainers/vprofileapp
  tag: latest
  replicas: 1
  containerPort: 8080
  servicePort: 8080
  defaultUser: guest

db:
  image: vprocontainers/vprofiledb
  tag: latest
  replicas: 1
  containerPort: 3306
  servicePort: 3306
  storageClass: gp2
  storageSize: 3Gi

memcached:
  image: memcached
  tag: latest
  replicas: 1
  containerPort: 11211
  servicePort: 11211

rabbitmq:
  image: rabbitmq
  tag: latest
  replicas: 1
  containerPort: 5672
  servicePort: 5672
  defaultUser: guest

initcontainers:
  image: busybox
  tag: latest
  dbCommand: "until nslookup vprodb.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for mydb; sleep 2; done;"
  memcacheCommand: "until nslookup vprocache01.$(cat /var/run/secrets/kubernetes.io/serviceaccount/namespace).svc.cluster.local; do echo waiting for memcache; sleep 2; done;"

ingress:
  enabled: false
  host: example.com
  servicePort: 8080

secrets:
  dbPassword: vprodbpass
  rmqPassword: guest

dockerregistry:
  enabled: false
  server: index.docker.io
  username: ""
  password: ""
  email: ""
